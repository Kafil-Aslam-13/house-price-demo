data:
  source_path: data/Housing.csv
  artifact_dir: artifacts

model:
  n_estimators: 100
  max_depth: 4
  learning_rate: 0.1
  random_state: 42
  test_size: 0.2

target_column: price

numeric_columns:
  - area
  - bedrooms
  - bathrooms
  - stories
  - parking

categorical_columns:
  - furnishingstatus

binary_columns:
  - mainroad
  - guestroom
  - basement
  - hotwaterheating
  - airconditioning
  - prefarea